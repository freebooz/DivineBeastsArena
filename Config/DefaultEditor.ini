[/Script/UnrealEd.EditorEngine]
; ========================================
; 编辑器引擎设置
; ========================================

; 自动保存
bAutoSaveEnable=True
AutoSaveTimeMinutes=10

; 自动加载最后打开的项目
bLoadTheMostRecentlyLoadedProjectAtStartup=True


[/Script/UnrealEd.EditorPerformanceSettings]
; ========================================
; 编辑器性能设置
; ========================================

; 实时编辑器视口
bThrottleCPUWhenNotForeground=True

; 编辑器视口帧率限制
RealtimeScreenPercentageMode=BasedOnDPIScale


[/Script/UnrealEd.LevelEditorPlaySettings]
; ========================================
; PIE（Play In Editor）设置
; ========================================

; 默认 PIE 模式
PlayNetMode=PIE_Standalone

; 运行专用服务器
bLaunchSeparateServer=False

; 客户端数量
PlayNumberOfClients=1

; 服务器端口
ServerPort=7777

; 客户端窗口大小
NewWindowWidth=1280
NewWindowHeight=720

; 居中新窗口
CenterNewWindow=True

; PIE 时自动编译蓝图
bAutoCompileBlueprintsOnPIE=True


[/Script/UnrealEd.ProjectPackagingSettings]
; ========================================
; 打包设置
; ========================================

; 不 Cook 的目录
+DirectoriesToNeverCook=(Path="/Game/Developer")
+DirectoriesToNeverCook=(Path="/Game/Test")

; 不打包的资产
+DirectoriesToNeverCook=(Path="/Game/Collections")


[/Script/UnrealEd.CookerSettings]
; ========================================
; Cooker 设置
; ========================================

; 迭代 Cook
bIterativeCookingForLaunchOn=True

; Cook 时压缩
bCompressed=True


[/Script/BlueprintGraph.BlueprintEditorSettings]
; ========================================
; 蓝图编辑器设置
; ========================================

; 保存时编译
bCompileOnSave=True

; 跳转到节点时居中
bCenterOnPin=True

; 默认启用上下文敏感
bExposeAllMemberComponentFunctions=True


[/Script/UnrealEd.EditorLoadingSavingSettings]
; ========================================
; 编辑器加载保存设置
; ========================================

; 自动重新导入纹理
bMonitorContentDirectories=True

; 自动重新导入
bAutoReimportTextures=True
bAutoReimportCSV=True


[/Script/UnrealEd.ContentBrowserSettings]
; ========================================
; 内容浏览器设置
; ========================================

; 显示引擎内容
bShowEngineContent=False

; 显示插件内容
bShowPluginContent=True

; 显示开发者内容
bShowDevelopersContent=True


[/Script/DataValidation.EditorValidatorSubsystem]
; ========================================
; 数据验证设置
; ========================================

; 保存时验证
bValidateOnSave=True