[/Script/DivineBeastsArena.DBAExternalServicesSettings]
; ========================================
; 外部服务设置（可选）
; ========================================

; 是否启用监控上报（可选功能，默认关闭）
bEnableMonitoring=False

; 是否启用运维可见性（可选功能，默认关闭）
bEnableGameOps=False

; 监控 API 基础 URL（可选）
MonitoringApiBaseUrl=

; 运维 API 基础 URL（可选）
GameOpsApiBaseUrl=

; 服务名称
ServiceName=DivineBeastsArena

; 请求超时时间（秒）
RequestTimeoutSeconds=5.0

; 本地缓冲区限制（条）
LocalBufferLimit=1000

; 上报间隔（秒）
ReportIntervalSeconds=60.0

; 重试次数
MaxRetryCount=3

; 熔断阈值（连续失败次数）
CircuitBreakerThreshold=5

; 说明：
; - 外部服务不可用时，游戏必须正常运行
; - 所有外部请求必须异步、可超时、可丢弃
; - 超过熔断阈值后自动停止请求
; - Shipping 构建不包含外部服务客户端代码


